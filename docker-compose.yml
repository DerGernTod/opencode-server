services:
  opencode:
    build: .
    container_name: opencode-web
    environment:
      - GIT_AUTHOR_NAME=${MY_GITHUB_AUTHOR}
      - GIT_AUTHOR_EMAIL=${MY_GITHUB_EMAIL}
      - GIT_COMMITTER_NAME=${MY_GITHUB_AUTHOR}
      - GIT_COMMITTER_EMAIL=${MY_GITHUB_EMAIL}
      - GH_TOKEN=${MY_GITHUB_PAT}
    working_dir: /projects
    command: sh -c "cd /projects && opencode serve --hostname 0.0.0.0 --port 3001"
    volumes:
      # Map your host projects folder to the container
      # Adjust "C:/Users/YourName/Projects" to your actual path
      - "C:/Users/gegen/workspaces/repos:/projects"
      # Persist OpenCode config & auth so you don't log in every time
      - ./opencode_config:/root/.config/opencode
      - ./opencode_data:/root/.local/share/opencode
    networks:
      - backend
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    volumes:
      - ./authelia:/config
    networks:
      - backend

  caddy:
    image: caddy:latest
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - HETZNER_API_KEY=${HETZNER_API_KEY}
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend

networks:
  backend:
    name: opencode-server_backend
    driver: bridge
    attachable: true

volumes:
  caddy_data:
  caddy_config:
    